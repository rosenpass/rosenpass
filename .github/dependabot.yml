version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      non-critical:
        update-types:
          - "minor"
          - "patch"
    # open-pull-requests-limit: 0 # temporarily disable dependabot

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      non-critical:
        update-types:
          - "minor"
          - "patch"
    # open-pull-requests-limit: 0 # temporarily disable dependabot
